substitutions:
  _REGION: us-central1
  _AR_REPOSITORY: CareSync
  _IMAGE_NAME: CareSync-web
  _SERVICE_NAME: CareSync-web
  _VITE_API_BASE_URL: https://CareSync-api-315569715049.us-central1.run.app
  _VITE_GOOGLE_CLIENT_ID: 315569715049-qodevt85o8hlvcdoa9rdq09nnm6kk3hn.apps.googleusercontent.com
  _VITE_DEMO_PATIENT_ID: "2"

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - frontend.Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:${BUILD_ID}
      - --build-arg
      - VITE_API_BASE_URL=${_VITE_API_BASE_URL}
      - --build-arg
      - VITE_GOOGLE_CLIENT_ID=${_VITE_GOOGLE_CLIENT_ID}
      - --build-arg
      - VITE_DEMO_PATIENT_ID=${_VITE_DEMO_PATIENT_ID}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:${BUILD_ID}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:${BUILD_ID}
      - --region
      - ${_REGION}
      - --platform
      - managed

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:${BUILD_ID}
